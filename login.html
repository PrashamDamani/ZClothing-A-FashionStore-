<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZCLOTHING — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/auth.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-left">
      <div class="auth-brand">Z<span>CLOTHING</span></div>
      <h2>Welcome Back</h2>
      <p>Sign in to access your personal style hub, wishlist, and exclusive member benefits.</p>
      <div class="auth-features">
        <div class="feature">✦ Early access to collections</div>
        <div class="feature">✦ Personal style recommendations</div>
        <div class="feature">✦ Order tracking & history</div>
        <div class="feature">✦ Free shipping on ₹15,000+</div>
      </div>
    </div>
    <div class="auth-right">
      <form id="loginForm">
        <h3>Sign In</h3>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="loginEmail" required placeholder="hello@zclothing.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" required placeholder="••••••••">
        </div>
        <div class="form-check">
          <input type="checkbox" id="rememberMe">
          <label>Remember me</label>
        </div>
        <button type="submit" class="btn-auth">Sign In</button>
        <p class="auth-switch">Don't have an account? <a href="register.html">Create one</a></p>
      </form>
    </div>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
