<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZCLOTHING — Order Confirmed</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
  <style>
    .confirmation-container {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
    }
    .confirmation-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      max-width: 600px;
      width: 100%;
      padding: 3rem;
      text-align: center;
      animation: fadeInUp 0.6s ease;
    }
    .success-icon {
      width: 80px;
      height: 80px;
      background: var(--success);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      margin: 0 auto 1rem;
      animation: scaleIn 0.5s ease;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { transform: scale(0); }
      to { transform: scale(1); }
    }
    .confirmation-card h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }
    .confirmation-card h1 em {
      color: var(--gold);
      font-style: italic;
    }
    .order-number {
      background: var(--surface);
      padding: 0.8rem;
      border-radius: 8px;
      margin: 1.5rem 0;
      font-family: 'DM Mono', monospace;
      font-size: 1.1rem;
      color: var(--gold);
    }
    .email-sent {
      background: rgba(122, 140, 90, 0.1);
      border: 1px solid var(--success);
      padding: 1rem;
      border-radius: 8px;
      margin: 1.5rem 0;
      font-size: 0.9rem;
    }
    .action-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 2rem;
    }
    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--warm-gray);
      padding: 0.8rem 1.5rem;
      text-decoration: none;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      transition: all 0.3s;
      border-radius: 8px;
    }
    .btn-secondary:hover {
      border-color: var(--gold);
      color: var(--gold);
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="logo">Z<span>CLOTHING</span></a>
  </header>

  <div class="confirmation-container">
    <div class="confirmation-card">
      <div class="success-icon">✓</div>
      <h1>Order <em>Confirmed</em></h1>
      <p>Thank you for shopping with ZCLOTHING</p>
      
      <div class="order-number" id="orderNumberDisplay">Loading...</div>
      
      <div class="email-sent" id="emailConfirmation">
        📧 Sending confirmation email...
      </div>
      
      <div class="action-buttons">
        <a href="dashboard.html" class="btn-primary">View Dashboard</a>
        <a href="home.html" class="btn-secondary">Continue Shopping</a>
      </div>
    </div>
  </div>

  <script src="js/order-confirmation.js"></script>
</body>
</html>
