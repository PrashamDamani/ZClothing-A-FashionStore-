<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZCLOTHING — Create Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/auth.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-left">
      <div class="auth-brand">Z<span>CLOTHING</span></div>
      <h2>Join the Atelier</h2>
      <p>Become a member and experience fashion that speaks to your individuality.</p>
      <div class="auth-features">
        <div class="feature">✦ 15% off first purchase</div>
        <div class="feature">✦ Birthday rewards</div>
        <div class="feature">✦ Exclusive pre-sales</div>
        <div class="feature">✦ Free shipping on ₹15,000+</div>
      </div>
    </div>
    <div class="auth-right">
      <form id="registerForm">
        <h3>Create Account</h3>
        <div class="form-row">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" id="regFirstName" required>
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" id="regLastName" required>
          </div>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="regEmail" required>
        </div>
        <div class="form-group">
          <label>Phone (optional)</label>
          <input type="tel" id="regPhone">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="regPassword" required minlength="6">
          <small>Minimum 6 characters</small>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="regConfirmPassword" required>
        </div>
        <div class="form-check">
          <input type="checkbox" id="regTerms" required>
          <label>I agree to the <a href="#">Terms & Conditions</a> and <a href="#">Privacy Policy</a></label>
        </div>
        <button type="submit" class="btn-auth">Create Account</button>
        <p class="auth-switch">Already have an account? <a href="login.html">Sign in</a></p>
      </form>
    </div>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
